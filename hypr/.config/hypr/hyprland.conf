# Hyprland starter config. Mod is SUPER (Windows key).
# Wiki: https://wiki.hyprland.org/

# G8 OLED (Samsung Odyssey G85SB) on the left, Acer on the right.
monitor = DP-2, 3440x1440@174.96, 0x0, 1
monitor = DP-1, 2560x1440@143.86, 3440x0, 1
monitor = , preferred, auto, 1

# Pin workspaces to monitors.
workspace = 1, monitor:DP-1, default:true, persistent:true
workspace = 2, monitor:DP-2, default:true, persistent:true

# NVIDIA (Blackwell, open kernel modules).
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice

exec-once = waybar
exec-once = mako
exec-once = awww-daemon
exec-once = awww img "$(cat ~/.cache/current_wallpaper 2>/dev/null)"
exec-once = hypridle
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1
exec-once = wl-clip-persist --clipboard regular
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

input {
    kb_layout = au
    follow_mouse = 1
    accel_profile = flat
    sensitivity = 0
}

general {
    gaps_in = 4
    gaps_out = 12
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 6
        passes = 2
    }
}

animations {
    enabled = true
    bezier = ease, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 5, ease
    animation = fade, 1, 5, ease
    animation = workspaces, 1, 5, ease
}

$mod = SUPER

bind = $mod, T, exec, ghostty
bind = $mod, W, exec, firefox
bind = $mod, E, exec, thunar
bind = $mod, C, exec, code
bind = $mod CTRL, D, exec, vesktop
bind = $mod CTRL, S, exec, steam
bind = $mod, Q, killactive,
bind = $mod, RETURN, exec, wofi --show drun
bind = $mod, V, exec, cliphist list | wofi --dmenu --prompt clipboard | cliphist decode | wl-copy
bind = $mod, M, exit,
bind = $mod, SPACE, togglefloating,
bind = $mod ALT, SPACE, togglefloating,
bind = $mod, F, fullscreen,
bind = $mod, P, pseudo,
bind = $mod, J, layoutmsg, togglesplit
bind = $mod, L, exec, hyprlock
bind = $mod SHIFT, S, exec, ~/.local/bin/hypr-screenshot-region
bind = $mod SHIFT, W, exec, ~/.local/bin/wallpaper-picker

bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = , Print, exec, ~/.local/bin/hypr-screenshot-region

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Pull palette generated by wallust last (overrides default border colors).
source = ~/.config/hypr/colors.conf
