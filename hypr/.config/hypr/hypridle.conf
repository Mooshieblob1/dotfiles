general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# Only DPMS-off the Acer (DP-1). The ultrawide (DP-2) is left powered because
# nvidia loses its EDID when the DP link drops on dpms-off, and re-reads only
# on a physical hotplug — so it would come back at 640x480 after every lock.
listener {
    timeout = 660
    on-timeout = hyprctl dispatch dpms off DP-1
    on-resume = hyprctl dispatch dpms on DP-1
}
